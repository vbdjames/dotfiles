# ~/.config/tmux/tmux.conf

# Status bar at top
set -g status-position top

# Window numbering starts at 1
set -g base-index 1

# Subtle status bar colors — dark grey bar, muted text
set -g status-style 'bg=#2a2a2a fg=#888888'
set -g window-status-current-style 'bg=#2a2a2a fg=#cccccc'
# Clean status bar — no session name or clock
set -g status-left ''
set -g status-right ''
